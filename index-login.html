<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartWare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/index-login.css">
</head>
<body class="flex items-center justify-center">

    <!-- Tarjeta principal con la clase .login-card de tu nuevo CSS -->
    <div class="login-card">
        <!-- Título dinámico gestionado por tu JS externo -->
        <h2 id="formTitle" class="text-2xl font-bold text-center mb-6">Iniciar Sesión</h2>

        <form id="loginForm">
            <div class="mb-4">
                <label class="block text-sm font-medium text-slate-700 mb-1">Usuario</label>
                <input type="text" id="usuario" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
                <input type="password" id="password" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>

            <!-- Botón principal con transición suave integrada (.btn-auth) -->
            <button type="submit" id="submitBtn" class="btn-auth w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-md">
                Entrar
            </button>
        </form>

        <!-- Sección inferior para alternar dinámicamente entre iniciar sesión y registrarse -->
        <div class="text-center mt-4 border-t border-slate-200 pt-4">
            <button id="toggleBtn" class="link-toggle text-sm text-blue-600 hover:underline">
                ¿No tienes cuenta? Regístrate aquí
            </button>
        </div>
    </div>

    <!-- Tu nuevo JavaScript modular e independiente conectado a Spring Boot -->
    <script src="js/index-login.js"></script>
</body>
</html>
